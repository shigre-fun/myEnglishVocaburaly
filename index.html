<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自分専用・英単語暗記アプリ</title>
    <style>
        /* 全体のデザイン調整 */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f5f7fa;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { text-align: center; color: #4a5568; }
        .nav-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn {
            flex: 1; padding: 12px; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer;
            transition: 0.2s;
        }
        .btn-main { background-color: #3182ce; color: white; }
        .btn-sub { background-color: #e2e8f0; color: #4a5568; }
        .btn:hover { opacity: 0.9; }

        /* 単語帳画面のスタイル */
        .word-list {
            max-height: 500px; /* 縦幅を制限してスクロール可能に */
            overflow-y: auto;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }
        .word-row {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            border-bottom: 1px solid #edf2f7;
        }
        .word-row:last-child { border-bottom: none; }
        .english { font-weight: bold; color: #2b6cb0; width: 45%; }
        .japanese { color: #4a5568; width: 45%; text-align: right; }

        /* テスト画面のスタイル */
        .hidden { display: none !important; }
        .test-box { text-align: center; padding: 30px 10px; }
        .test-word { font-size: 32px; font-weight: bold; color: #2b6cb0; margin-bottom: 10px; }
        .test-counter { color: #a0aec0; font-size: 14px; margin-bottom: 20px; }
        .answer-box {
            font-size: 24px; color: #e53e3e; font-weight: bold;
            min-height: 40px; margin-bottom: 30px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 My単語帳</h1>
    
    <div class="nav-buttons">
        <button class="btn btn-main" onclick="showSection('list-section')">単語帳を見る</button>
        <button class="btn btn-sub" onclick="startTest()">テストに挑戦</button>
    </div>

    <div id="list-section">
        <div class="word-list" id="word-list-container">
            </div>
    </div>

    <div id="test-section" class="hidden">
        <div class="test-box">
            <div id="test-counter" class="test-counter">第 1 問 / 10問中</div>
            <div id="test-english" class="test-word">apple</div>
            <div id="test-japanese" class="answer-box"></div>
            
            <button id="action-btn" class="btn btn-main" style="width: 80%; margin-bottom: 10px;" onclick="handleTestAction()">答えを見る</button>
            <button class="btn btn-sub" style="width: 80%;" onclick="showSection('list-section')">テストを中断</button>
        </div>
    </div>
</div>

<script>
    // 💡 ここに自作の英単語リストを打ち込みます（サンプルとして12個入れています）
    // 将来的には50個、100個と増やしていけます
    const wordGroup1 = [
        { en: "apple", ja: "りんご" },
        { en: "book", ja: "本" },
        { en: "cat", ja: "猫" },
        { en: "dog", ja: "犬" },
        { en: "elephant", ja: "ゾウ" },
        { en: "flower", ja: "花" },
        { en: "guitar", ja: "ギター" },
        { en: "house", ja: "家" },
        { en: "ice", ja: "氷" },
        { en: "juice", ja: "ジュース" },
        { en: "knife", ja: "ナイフ" },
        { en: "lemon", ja: "レモン" }
        // 50個までここにカンマ（,）区切りで追加していけます
    ];

    // テストの進行状態を管理する変数
    let testWords = [];
    let currentQuestionIndex = 0;
    let isShowingAnswer = false;

    // 起動時に単語帳を生成
    function initApp() {
        const container = document.getElementById('word-list-container');
        container.innerHTML = ''; // 初期化
        
        wordGroup1.forEach(word => {
            const row = document.createElement('div');
            row.className = 'word-row';
            row.innerHTML = `<span class="english">${word.en}</span><span class="japanese">${word.ja}</span>`;
            container.appendChild(row);
        });
    }

    // 画面の表示切り替え（単語帳 ⇄ テスト）
    function showSection(sectionId) {
        document.getElementById('list-section').classList.add('hidden');
        document.getElementById('test-section').classList.add('hidden');
        document.getElementById(sectionId).classList.remove('hidden');
    }

    // 抜き打ちテストの開始処理（ランダムに10個抽出）
    function startTest() {
        if (wordGroup1.length < 10) {
            alert("テストを始めるには単語が最低10個必要です！データを入れてみてください。");
            return;
        }
        
        // 配列をランダムにシャッフルして先頭の10個を抜き出す
        const shuffled = [...wordGroup1].sort(() => 0.5 - Math.random());
        testWords = shuffled.slice(0, 10);
        
        currentQuestionIndex = 0;
        isShowingAnswer = false;
        
        showSection('test-section');
        showQuestion();
    }

    // 問題を表示する
    function showQuestion() {
        const currentWord = testWords[currentQuestionIndex];
        document.getElementById('test-counter').innerText = `第 ${currentQuestionIndex + 1} 問 / 10問中`;
        document.getElementById('test-english').innerText = currentWord.en;
        document.getElementById('test-japanese').innerText = ""; // 答えは最初隠す
        document.getElementById('action-btn').innerText = "答えを見る";
        isShowingAnswer = false;
    }

    // テスト画面のボタンが押された時の処理（答えを見る ⇄ 次へ）
    function handleTestAction() {
        const currentWord = testWords[currentQuestionIndex];
        
        if (!isShowingAnswer) {
            // 答えを表示
            document.getElementById('test-japanese').innerText = currentWord.ja;
            document.getElementById('action-btn').innerText = (currentQuestionIndex === 9) ? "結果を見る" : "次へ進む";
            isShowingAnswer = true;
        } else {
            // 次の問題へ進む、または終了
            if (currentQuestionIndex < 9) {
                currentQuestionIndex++;
                showQuestion();
            } else {
                alert("テスト終了！お疲れ様でした！単語帳画面に戻ります。");
                showSection('list-section');
            }
        }
    }

    // アプリの初期化を実行
    initApp();
</script>

</body>
</html>
